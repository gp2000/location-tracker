<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Location Logger</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 450px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; margin: 10px 0; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        select { width: 100%; padding: 12px; margin-bottom: 15px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 8px; font-size: 16px; }
        #status { font-weight: bold; margin: 15px 0; color: #ffb74d; }
        #log { text-align: left; background: #2d2d2d; padding: 12px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Location Logger</h2>
        
        <label for="intervalSelect">Tracking Interval:</label>
        <select id="intervalSelect">
            <option value="1">1 Minute</option>
            <option value="2">2 Minutes</option>
            <option value="3">3 Minutes</option>
            <option value="5" selected>5 Minutes</option>
        </select>

        <button id="toggleBtn" class="btn-start">Start Tracking</button>
        
        <div id="status">Status: Idle</div>
        
        <h3>Current Session Logs:</h3>
        <div id="log">No coordinates recorded yet.</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        let trackingInterval = null;
        let locationWatchId = null;
        let lastKnownCoords = null;
        let wakeLock = null;
        let isTracking = false;
        let audioCtx = null;
        let audioSource = null;
        
        let sessionData = []; 
        let startTimeString = "";
        let sessionDateString = "";

        const toggleBtn = document.getElementById('toggleBtn');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        const intervalSelect = document.getElementById('intervalSelect');

        function getCleanTime() {
            const now = new Date();
            return now.toTimeString().split(' ')[0].replace(/:/g, '').substring(0, 4);
        }

        function getCleanDate() {
            const now = new Date();
            return now.toISOString().split('T')[0];
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function playBackgroundSilence() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                audioSource = audioCtx.createBufferSource();
                audioSource.buffer = buffer;
                audioSource.loop = true;
                audioSource.connect(audioCtx.destination);
                audioSource.start();
            } catch (e) {
                console.error("Audio failed:", e);
            }
        }

        function stopBackgroundSilence() {
            if (audioSource) { audioSource.stop(); audioSource.disconnect(); audioSource = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }

        function initLocationWatch() {
            if (!navigator.geolocation) return;
            
            locationWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    lastKnownCoords = position.coords;
                },
                (error) => {
                    console.log("Watch error status:", error.message);
                },
                { 
                    enableHighAccuracy: false, 
                    timeout: Infinity,         
                    maximumAge: 60000          
                }
            );
        }

        function recordLocation() {
            const timeStamp = new Date().toLocaleTimeString();
            
            if (lastKnownCoords) {
                const lat = lastKnownCoords.latitude.toFixed(6);
                const lon = lastKnownCoords.longitude.toFixed(6);
                const logLine = `[${timeStamp}] Lat: ${lat}, Lon: ${lon}`;
                
                if(sessionData.length === 0) logDiv.innerHTML = "";
                logDiv.innerHTML = `<div>${logLine}</div>` + logDiv.innerHTML;
                sessionData.push(logLine);
            } else {
                const logLine = `[${timeStamp}] Waiting for GPS satellite fix...`;
                logDiv.innerHTML = `<div>${logLine}</div>` + logDiv.innerHTML;
            }
        }

        function startTracking() {
            isTracking = true;
            sessionData = [];
            sessionDateString = getCleanDate();
            startTimeString = getCleanTime();
            
            toggleBtn.innerText = "Stop & Save File";
            toggleBtn.className = "btn-stop";
            statusDiv.innerText = "Status: Background Tracking Active";
            
            requestWakeLock();
            playBackgroundSilence();
            initLocationWatch();
            
            recordLocation();
            const minutes = parseInt(intervalSelect.value, 10);
            trackingInterval = setInterval(recordLocation, minutes * 60 * 1000);
        }

        function stopTracking() {
            isTracking = false;
            clearInterval(trackingInterval);
            if (locationWatchId) {
                navigator.geolocation.clearWatch(locationWatchId);
                locationWatchId = null;
            }
            releaseWakeLock();
            stopBackgroundSilence();
            
            toggleBtn.innerText = "Start Tracking";
            toggleBtn.className = "btn-start";
            statusDiv.innerText = "Status: Idle (Saved)";

            if (sessionData.length > 0) {
                exportTextFile();
            } else {
                alert("No coordinates gathered.");
            }
        }

        function exportTextFile() {
            const endTimeString = getCleanTime();
            const fileContent = sessionData.join('\n');
            const fileName = `${sessionDateString}-${startTimeString}-${endTimeString}.txt`;
            const blob = new Blob([fileContent], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        toggleBtn.addEventListener('click', () => {
            if (!isTracking) startTracking(); else stopTracking();
        });

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isTracking) {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
